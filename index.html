<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URwater CRM</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCD5kRxH0-tIemXG4wnmLvv8hnSBXyDsX0",
      authDomain: "urwater-crm.firebaseapp.com",
      projectId: "urwater-crm",
      storageBucket: "urwater-crm.firebasestorage.app",
      messagingSenderId: "194637169182",
      appId: "1:194637169182:web:7a72289893a6ff24d7a40f"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    let allCustomers = [];
    let editingId    = null;

    // ── Auth ───────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-screen").classList.remove("hidden");
        document.getElementById("user-email").textContent = user.email;
        loadCustomers();
      } else {
        document.getElementById("auth-screen").classList.remove("hidden");
        document.getElementById("app-screen").classList.add("hidden");
      }
    });

    window.login = async () => {
      const email    = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const errEl    = document.getElementById("login-error");
      errEl.textContent = "";
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        errEl.textContent = "Invalid credentials. Please try again.";
      }
    };

    window.logout = () => signOut(auth);

    // ── Load & Render ──────────────────────────────
    async function loadCustomers() {
      document.getElementById("customer-tbody").innerHTML =
        `<tr><td colspan="15" class="empty-row" style="color:var(--accent)">Loading records…</td></tr>`;
      try {
        const snap = await getDocs(collection(db, "customers"));
        allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (a.practiceName || "").localeCompare(b.practiceName || ""));
        renderTable(allCustomers);
        updateStats(allCustomers);
        populateAreaFilter();
      } catch (e) {
        document.getElementById("customer-tbody").innerHTML =
          `<tr><td colspan="15" class="empty-row" style="color:var(--danger)">Failed to load: ${e.message}</td></tr>`;
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("customer-tbody");
      tbody.innerHTML = "";
      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="15" class="empty-row">No records yet. Add one or import a spreadsheet.</td></tr>`;
        return;
      }
      data.forEach(c => {
        // Sent is a date string (e.g. "12/06/2024") or blank — green if populated, grey if not
        const sentClass  = (c.sent  && c.sent  !== "No") ? "badge-signed"   : "badge-prospect";
        const replyClass = (c.reply && c.reply !== "No") ? "badge-completed" : "badge-prospect";
        tbody.innerHTML += `
          <tr>
            <td title="${esc(c.area)}">${esc(c.area)}</td>
            <td title="${esc(c.practiceName)}">${esc(c.practiceName)}</td>
            <td title="${esc(c.doctorName)}">${esc(c.doctorName)}</td>
            <td title="${esc(c.organisationCode)}">${esc(c.organisationCode)}</td>
            <td title="${esc(c.postCode)}">${esc(c.postCode)}</td>
            <td title="${esc(c.addressLine1)}">${esc(c.addressLine1)}</td>
            <td title="${esc(c.icb)}">${esc(c.icb)}</td>
            <td title="${esc(c.phone)}">${esc(c.phone)}</td>
            <td title="${esc(c.practiceManager)}">${esc(c.practiceManager)}</td>
            <td title="${esc(c.emailCont)}">${esc(c.emailCont)}</td>
            <td title="${esc(c.spid)}">${esc(c.spid)}</td>
            <td title="${esc(c.group)}">${esc(c.group)}</td>
            <td><span class="badge ${sentClass}">${esc(c.sent || "No")}</span></td>
            <td><span class="badge ${replyClass}">${esc(c.reply || "No")}</span></td>
            <td class="action-cell">
              <button class="btn-icon edit-btn" onclick="openEdit('${c.id}')">✎</button>
              <button class="btn-icon del-btn" onclick="deleteCustomer('${c.id}')">✕</button>
            </td>
          </tr>`;
      });
    }

    function updateStats(data) {
      document.getElementById("stat-total").textContent  = data.length;
      document.getElementById("stat-sent").textContent   = data.filter(c => c.sent && c.sent !== "No").length;
      document.getElementById("stat-reply").textContent  = data.filter(c => c.reply === "Yes").length;
      const areas = new Set(data.map(c => c.area).filter(Boolean));
      document.getElementById("stat-areas").textContent  = areas.size;
    }

    // ── Search & Filter ────────────────────────────
    window.filterTable = () => {
      const q  = document.getElementById("search-input").value.toLowerCase();
      const af = document.getElementById("area-filter").value;
      const sf = document.getElementById("sent-filter").value;
      let filtered = allCustomers.filter(c => {
        const matchQ = !q || [c.practiceName, c.doctorName, c.postCode, c.spid, c.area, c.emailCont, c.organisationCode].some(f => (f||"").toLowerCase().includes(q));
        const matchA = !af || c.area === af;
        const matchS = !sf || (sf === "yes" ? (c.sent && c.sent !== "No") : (!c.sent || c.sent === "No"));
        return matchQ && matchA && matchS;
      });
      renderTable(filtered);
    };

    window.populateAreaFilter = () => {
      const areas  = [...new Set(allCustomers.map(c => c.area).filter(Boolean))].sort();
      const select = document.getElementById("area-filter");
      select.innerHTML = `<option value="">All areas</option>` + areas.map(a => `<option>${esc(a)}</option>`).join("");
    };

    // ── Add / Edit ─────────────────────────────────
    window.openAdd = () => {
      editingId = null;
      document.getElementById("modal-title").textContent = "Add Practice";
      clearForm();
      document.getElementById("modal").classList.remove("hidden");
    };

    window.openEdit = (id) => {
      editingId = id;
      const c = allCustomers.find(x => x.id === id);
      if (!c) return;
      document.getElementById("modal-title").textContent = "Edit Practice";
      document.getElementById("f-area").value             = c.area || "";
      document.getElementById("f-practiceName").value     = c.practiceName || "";
      document.getElementById("f-doctorName").value       = c.doctorName || "";
      document.getElementById("f-organisationCode").value = c.organisationCode || "";
      document.getElementById("f-postCode").value         = c.postCode || "";
      document.getElementById("f-addressLine1").value     = c.addressLine1 || "";
      document.getElementById("f-icb").value              = c.icb || "";
      document.getElementById("f-phone").value            = c.phone || "";
      document.getElementById("f-practiceManager").value  = c.practiceManager || "";
      document.getElementById("f-emailCont").value        = c.emailCont || "";
      document.getElementById("f-spid").value             = c.spid || "";
      document.getElementById("f-group").value            = c.group || "";
      document.getElementById("f-sent").value             = c.sent || "No";
      document.getElementById("f-reply").value            = c.reply || "No";
      document.getElementById("modal").classList.remove("hidden");
    };

    window.closeModal = () => {
      document.getElementById("modal").classList.add("hidden");
      editingId = null;
    };

    window.saveCustomer = async () => {
      const data = {
        area:             document.getElementById("f-area").value.trim(),
        practiceName:     document.getElementById("f-practiceName").value.trim(),
        doctorName:       document.getElementById("f-doctorName").value.trim(),
        organisationCode: document.getElementById("f-organisationCode").value.trim(),
        postCode:         document.getElementById("f-postCode").value.trim(),
        addressLine1:     document.getElementById("f-addressLine1").value.trim(),
        icb:              document.getElementById("f-icb").value.trim(),
        phone:            document.getElementById("f-phone").value.trim(),
        practiceManager:  document.getElementById("f-practiceManager").value.trim(),
        emailCont:        document.getElementById("f-emailCont").value.trim(),
        spid:             document.getElementById("f-spid").value.trim(),
        group:            document.getElementById("f-group").value.trim(),
        sent:             document.getElementById("f-sent").value,
        reply:            document.getElementById("f-reply").value,
      };
      if (!data.practiceName) { alert("Practice name is required."); return; }

      const saveBtn = document.getElementById("save-btn");
      saveBtn.disabled = true; saveBtn.textContent = "Saving…";

      try {
        if (editingId) {
          await updateDoc(doc(db, "customers", editingId), data);
        } else {
          data.createdAt = new Date();
          await addDoc(collection(db, "customers"), data);
        }
        closeModal();
        await loadCustomers();
        populateAreaFilter();
      } catch (e) {
        alert("Error saving: " + e.message);
      } finally {
        saveBtn.disabled = false; saveBtn.textContent = "Save";
      }
    };

    window.deleteCustomer = async (id) => {
      const c = allCustomers.find(x => x.id === id);
      if (!confirm(`Delete ${c?.practiceName}? This cannot be undone.`)) return;
      await deleteDoc(doc(db, "customers", id));
      await loadCustomers();
      populateAreaFilter();
    };

    function clearForm() {
      ["f-area","f-practiceName","f-doctorName","f-organisationCode","f-postCode",
       "f-addressLine1","f-icb","f-phone","f-practiceManager","f-emailCont","f-spid","f-group"]
        .forEach(id => { document.getElementById(id).value = ""; });
      document.getElementById("f-sent").value  = "";
      document.getElementById("f-reply").value = "No";
    }

    // ── Import ─────────────────────────────────────
    // Maps spreadsheet column headers → our field names
    const COLUMN_MAP = {
      area:             ["area"],
      practiceName:     ["practice name","practicename","practice"],
      doctorName:       ["doctor name","doctorname","doctor","dr name"],
      organisationCode: ["organisation code","org code","organisationcode","orgcode","organisation"],
      postCode:         ["post code","postcode","post_code","zip"],
      addressLine1:     ["address line 1","address line1","addressline1","address 1","address"],
      icb:              ["icb","integrated care board"],
      phone:            ["phone","telephone","tel","contact number","phone number"],
      practiceManager:  ["practice manager","practicemanager","manager"],
      emailCont:        ["email cont.","email cont","email contact","email","e-mail","contact email"],
      spid:             ["spid","supply point id","supply point","meter ref","mpan"],
      group:            ["group"],
      sent:             ["sent"],
      reply:            ["reply","replied"],
    };

    window.triggerImport = () => document.getElementById("import-file").click();

    window.handleImport = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const ext = file.name.split(".").pop().toLowerCase();
      if (!["csv","xlsx","xls","ods"].includes(ext)) { alert("Please upload a .csv, .xlsx, .xls, or .ods file."); return; }

      const statusEl = document.getElementById("import-status");
      statusEl.textContent = "Reading file…";
      statusEl.className = "import-status info";

      try {
        const rows = ext === "csv" ? await parseCSV(file) : await parseXLSX(file);
        if (!rows.length) { statusEl.textContent = "No data rows found."; return; }

        const headers = Object.keys(rows[0]).map(h => h.trim().toLowerCase());
        const colIdx  = {};
        for (const [field, aliases] of Object.entries(COLUMN_MAP)) {
          colIdx[field] = aliases.find(a => headers.includes(a)) ?? null;
        }

        let imported = 0, skipped = 0;
        const validRecords = [];
        for (const row of rows) {
          const norm = {};
          for (const [field, alias] of Object.entries(colIdx)) {
            if (alias) {
              const rawKey = Object.keys(row).find(k => k.trim().toLowerCase() === alias);
              norm[field] = rawKey ? (row[rawKey]||"").toString().trim() : "";
            } else {
              norm[field] = "";
            }
          }
          if (!norm.practiceName && !norm.organisationCode) { skipped++; continue; }
          if (norm.sent) norm.sent = excelDateToString(norm.sent);
          norm.importedAt = new Date().toISOString();
          validRecords.push(norm);
        }

        // Write in batches of 499 (Firestore max is 500)
        const BATCH_SIZE = 499;
        for (let i = 0; i < validRecords.length; i += BATCH_SIZE) {
          const batch = writeBatch(db);
          validRecords.slice(i, i + BATCH_SIZE).forEach(record => {
            batch.set(doc(collection(db, "customers")), record);
          });
          await batch.commit();
          imported += Math.min(BATCH_SIZE, validRecords.length - i);
        }

        statusEl.textContent = `✓ Imported ${imported} record${imported !== 1 ? "s" : ""}${skipped ? ` (${skipped} skipped — no practice name or org code)` : ""}.`;
        statusEl.className = "import-status success";
        await loadCustomers();
        populateAreaFilter();
      } catch (err) {
        statusEl.textContent = "Import failed: " + err.message;
        statusEl.className = "import-status error";
      }
      e.target.value = "";
    };

    function parseCSV(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
          if (lines.length < 2) { res([]); return; }
          const headers = csvSplit(lines[0]);
          res(lines.slice(1).map(line => {
            const vals = csvSplit(line);
            const obj  = {};
            headers.forEach((h, i) => { obj[h] = vals[i] ?? ""; });
            return obj;
          }));
        };
        reader.onerror = rej;
        reader.readAsText(file);
      });
    }

    function csvSplit(line) {
      const result = []; let cur = ""; let inQ = false;
      for (const ch of line) {
        if (ch === '"') inQ = !inQ;
        else if (ch === "," && !inQ) { result.push(cur.trim()); cur = ""; }
        else cur += ch;
      }
      result.push(cur.trim());
      return result;
    }

    // ── Excel date serial → readable date ─────────
    function excelDateToString(val) {
      if (!val && val !== 0) return "";
      if (typeof val === "string" && isNaN(val.trim())) return val.trim();
      const num = typeof val === "string" ? parseFloat(val.trim()) : val;
      if (isNaN(num)) return val.toString().trim();
      // Excel serial: days since 1 Jan 1900 (accounting for Lotus leap year bug)
      const date = new Date(Math.round((num - 25569) * 86400 * 1000));
      if (isNaN(date.getTime())) return val.toString().trim();
      return date.toLocaleDateString("en-GB"); // DD/MM/YYYY
    }

    function parseXLSX(file) {
      return new Promise((res, rej) => {
        if (!window.XLSX) { rej(new Error("XLSX library not loaded yet — try again in a moment.")); return; }
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const wb   = XLSX.read(e.target.result, { type: "array" });
            const ws   = wb.Sheets[wb.SheetNames[0]];
            res(XLSX.utils.sheet_to_json(ws, { defval: "" }));
          } catch (err) { rej(err); }
        };
        reader.onerror = rej;
        reader.readAsArrayBuffer(file);
      });
    }

    // ── Export ─────────────────────────────────────
    window.exportCSV = () => {
      const headers = ["Area","Practice Name","Doctor Name","Organisation Code","Post Code","Address Line 1","ICB","Phone","Practice Manager","Email Cont.","SPID","Group","Sent","Reply"];
      const rows = allCustomers.map(c => [
        c.area, c.practiceName, c.doctorName, c.organisationCode, c.postCode,
        c.addressLine1, c.icb, c.phone, c.practiceManager, c.emailCont,
        c.spid, c.group, c.sent, c.reply
      ].map(v => `"${(v||"").replace(/"/g,'""')}"`));
      const csv  = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const a    = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = `urwater-crm-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    };

    function esc(s) {
      return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("modal").addEventListener("click", e => {
        if (e.target.id === "modal") closeModal();
      });
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #21282f;
      --accent:  #1e7aff;
      --accent2: #00c896;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --danger:  #f85149;
      --warn:    #d29922;
      --radius:  10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Mono", monospace; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
    .hidden { display: none !important; }

    /* Auth */
    #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 60% 30%, #0a1f44 0%, #0d1117 70%); }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 380px; box-shadow: 0 24px 80px rgba(0,0,0,0.6); }
    .auth-logo { font-family: "Syne", sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
    .auth-sub  { color: var(--muted); font-size: 12px; margin-bottom: 28px; }
    .auth-card label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 5px; }
    .auth-card input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 13px; margin-bottom: 14px; outline: none; transition: border-color .2s; }
    .auth-card input:focus { border-color: var(--accent); }
    #login-error { color: var(--danger); font-size: 12px; margin-bottom: 10px; min-height: 16px; }

    /* App shell */
    #app-screen { display: flex; flex-direction: column; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .logo { font-family: "Syne", sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #user-email { color: var(--muted); font-size: 12px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-family: inherit; font-size: 12px; cursor: pointer; border: none; transition: filter .15s, opacity .15s; }
    .btn:hover { filter: brightness(1.1); } .btn:active { opacity: .85; } .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary   { background: var(--accent);  color: #fff; }
    .btn-secondary { background: var(--border);  color: var(--text); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 6px; transition: background .15s; }
    .edit-btn { color: var(--accent); } .edit-btn:hover { background: rgba(30,122,255,.12); }
    .del-btn  { color: var(--danger); } .del-btn:hover  { background: rgba(248,81,73,.12); }

    /* Main */
    main { flex: 1; padding: 24px 28px; width: 100%; margin: 0 auto; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-family: "Syne", sans-serif; font-size: 28px; font-weight: 700; }
    .stat-value.blue  { color: var(--accent); }
    .stat-value.green { color: var(--accent2); }
    .stat-value.warn  { color: var(--warn); }
    .stat-value.muted { color: var(--muted); }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar input, .toolbar select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 12px; font-family: inherit; font-size: 12px; outline: none; transition: border-color .2s; }
    .toolbar input { flex: 1; min-width: 200px; }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
    .toolbar select option { background: var(--surface); }
    .toolbar-spacer { flex: 1; }

    /* Table */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface); }
    th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    .empty-row { text-align: center; color: var(--muted); padding: 40px; }

    /* Badges */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; }
    .badge-prospect   { background: rgba(125,133,144,.15); color: var(--muted); }
    .badge-signed     { background: rgba(0,200,150,.15);   color: var(--accent2); }
    .badge-completed  { background: rgba(30,122,255,.15);  color: var(--accent); }

    /* Import status */
    .import-status { font-size: 12px; padding: 8px 14px; border-radius: var(--radius); margin-top: 8px; }
    .import-status.info    { background: rgba(30,122,255,.1); color: var(--accent); }
    .import-status.success { background: rgba(0,200,150,.1);  color: var(--accent2); }
    .import-status.error   { background: rgba(248,81,73,.1);  color: var(--danger); }

    /* Modal */
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; width: 640px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 100px rgba(0,0,0,.6); }
    .modal-card h2 { font-family: "Syne", sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color .2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--surface); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  </style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">URwater CRM</div>
    <div class="auth-sub">GP Practice water account management</div>
    <label>Email address</label>
    <input id="login-email" type="email" placeholder="you@urwater.co.uk" />
    <label>Password</label>
    <input id="login-password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    <div id="login-error"></div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Sign In →</button>
  </div>
</div>

<!-- App -->
<div id="app-screen" class="hidden">
  <header>
    <div class="logo">UR<span>water</span> CRM</div>
    <div class="header-right">
      <span id="user-email"></span>
      <button class="btn btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Total Practices</div><div class="stat-value blue" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Emails Sent</div><div class="stat-value green" id="stat-sent">—</div></div>
      <div class="stat-card"><div class="stat-label">Replies Received</div><div class="stat-value warn" id="stat-reply">—</div></div>
      <div class="stat-card"><div class="stat-label">Areas Covered</div><div class="stat-value muted" id="stat-areas">—</div></div>
    </div>

    <div class="toolbar">
      <input id="search-input" type="text" placeholder="Search practice, doctor, postcode, SPID, org code…" oninput="filterTable()" />
      <select id="area-filter" onchange="filterTable()"><option value="">All areas</option></select>
      <select id="sent-filter" onchange="filterTable()">
        <option value="">Sent: All</option>
        <option value="yes">Sent</option>
        <option value="no">Not sent</option>
      </select>
      <div class="toolbar-spacer"></div>
      <button class="btn btn-secondary" onclick="triggerImport()">⬆ Import</button>
      <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Practice</button>
    </div>

    <input type="file" id="import-file" accept=".csv,.xlsx,.xls,.ods" class="hidden" onchange="handleImport(event)" />
    <div id="import-status"></div>

    <div class="table-wrap" style="margin-top:10px">
      <table>
        <thead>
          <tr>
            <th>Area</th>
            <th>Practice Name</th>
            <th>Doctor Name</th>
            <th>Org Code</th>
            <th>Post Code</th>
            <th>Address</th>
            <th>ICB</th>
            <th>Phone</th>
            <th>Practice Manager</th>
            <th>Email</th>
            <th>SPID</th>
            <th>Group</th>
            <th>Sent</th>
            <th>Reply</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="customer-tbody">
          <tr><td colspan="15" class="empty-row">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-card">
    <h2 id="modal-title">Add Practice</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Area</label>
        <input id="f-area" type="text" placeholder="e.g. Yorkshire" />
      </div>
      <div class="form-group">
        <label>Practice Name *</label>
        <input id="f-practiceName" type="text" placeholder="Kirkgate Medical Centre" />
      </div>
      <div class="form-group">
        <label>Doctor Name</label>
        <input id="f-doctorName" type="text" placeholder="Dr Jane Smith" />
      </div>
      <div class="form-group">
        <label>Organisation Code</label>
        <input id="f-organisationCode" type="text" placeholder="B82005" />
      </div>
      <div class="form-group">
        <label>Post Code</label>
        <input id="f-postCode" type="text" placeholder="LS1 4AP" />
      </div>
      <div class="form-group">
        <label>Address Line 1</label>
        <input id="f-addressLine1" type="text" placeholder="12 High Street" />
      </div>
      <div class="form-group">
        <label>ICB</label>
        <input id="f-icb" type="text" placeholder="West Yorkshire ICB" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input id="f-phone" type="text" placeholder="01134 000000" />
      </div>
      <div class="form-group">
        <label>Practice Manager</label>
        <input id="f-practiceManager" type="text" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email Contact</label>
        <input id="f-emailCont" type="email" placeholder="manager@practice.nhs.uk" />
      </div>
      <div class="form-group">
        <label>SPID</label>
        <input id="f-spid" type="text" placeholder="3006153308 or EFW289998-0" />
      </div>
      <div class="form-group">
        <label>Group</label>
        <input id="f-group" type="text" placeholder="e.g. PCN North" />
      </div>
      <div class="form-group">
        <label>Sent Date (DD/MM/YYYY or leave blank)</label>
        <input id="f-sent" type="text" placeholder="e.g. 12/06/2024" />
      </div>
      <div class="form-group">
        <label>Reply</label>
        <select id="f-reply">
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveCustomer()">Save</button>
    </div>
  </div>
</div>

</body>
</html>
